name: Update YouTube Feed
on:
  schedule:
    # GitHub používá časovou zónu UTC. 
    # 15:05 UTC odpovídá 16:05 našeho zimního času (SEČ).
    - cron: '5 15 * * *'
  workflow_dispatch: # Toto tlačítko ti umožní spustit aktualizaci na GitHubu i ručně

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v3
        
      - name: Instalace Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Stažení YouTube dat
        run: node docs/update-youtube.js
        
      - name: Uložení a nahrání změn (Commit & Push)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add docs/youtube-data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatická aktualizace YouTube feedu" && git push)
